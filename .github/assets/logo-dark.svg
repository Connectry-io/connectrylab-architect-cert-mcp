<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 80" width="480" height="80">
  <defs>
    <linearGradient id="gradient-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#E8784A"/>
      <stop offset="100%" style="stop-color:#D4603A"/>
    </linearGradient>
  </defs>

  <!-- Node/Architect hexagon icon -->
  <polygon points="30,12 52,23 52,45 30,56 8,45 8,23" fill="none" stroke="url(#gradient-dark)" stroke-width="3.5" stroke-linejoin="round"/>
  <!-- Inner connection nodes -->
  <circle cx="30" cy="28" r="4" fill="url(#gradient-dark)"/>
  <circle cx="20" cy="43" r="3" fill="url(#gradient-dark)" opacity="0.7"/>
  <circle cx="40" cy="43" r="3" fill="url(#gradient-dark)" opacity="0.7"/>
  <!-- Connection lines -->
  <line x1="30" y1="28" x2="20" y2="43" stroke="url(#gradient-dark)" stroke-width="2" opacity="0.5"/>
  <line x1="30" y1="28" x2="40" y2="43" stroke="url(#gradient-dark)" stroke-width="2" opacity="0.5"/>
  <line x1="20" y1="43" x2="40" y2="43" stroke="url(#gradient-dark)" stroke-width="2" opacity="0.3"/>

  <!-- Architect Cert Text -->
  <text x="68" y="52" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="38" font-weight="700" fill="#FFFFFF">Architect Cert</text>
</svg>
