<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Dashboard — Connectry Architect</title>
<style>
:root {
  --bg: #0a0a0b;
  --surface: #18181b;
  --surface2: #27272a;
  --surface3: #303033;
  --accent: #E8784A;
  --accent-glow: rgba(232, 120, 74, 0.15);
  --accent-glow2: rgba(232, 120, 74, 0.08);
  --tx: #fafafa;
  --tx2: #a1a1aa;
  --tx3: #71717a;
  --bd: rgba(255, 255, 255, 0.06);
  --bd2: rgba(255, 255, 255, 0.1);
  --ok: #22c55e;
  --ok-bg: rgba(34, 197, 94, 0.1);
  --warn: #eab308;
  --warn-bg: rgba(234, 179, 8, 0.1);
  --err: #ef4444;
  --err-bg: rgba(239, 68, 68, 0.1);
  --r: 12px;
  --r-sm: 8px;
  --glass: rgba(24, 24, 27, 0.7);
  --blur: 12px;
  --sh: 0 1px 2px rgba(0,0,0,.3), 0 4px 12px rgba(0,0,0,.2);
  --sh-lg: 0 4px 24px rgba(0,0,0,.4);
  --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
}

@media (prefers-color-scheme: light) {
  :root {
    --bg: #f4f4f5;
    --surface: #ffffff;
    --surface2: #f0f0f2;
    --surface3: #e4e4e7;
    --tx: #18181b;
    --tx2: #52525b;
    --tx3: #a1a1aa;
    --bd: rgba(0, 0, 0, 0.06);
    --bd2: rgba(0, 0, 0, 0.1);
    --glass: rgba(255, 255, 255, 0.8);
    --accent-glow: rgba(232, 120, 74, 0.12);
    --accent-glow2: rgba(232, 120, 74, 0.06);
    --sh: 0 1px 2px rgba(0,0,0,.06), 0 4px 12px rgba(0,0,0,.04);
    --sh-lg: 0 4px 24px rgba(0,0,0,.08);
    --ok-bg: rgba(34, 197, 94, 0.08);
    --warn-bg: rgba(234, 179, 8, 0.08);
    --err-bg: rgba(239, 68, 68, 0.08);
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--tx);
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

.dashboard {
  max-width: 960px;
  margin: 0 auto;
  padding: 24px 20px 48px;
}

/* ─── Header ─── */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  margin-bottom: 32px;
  padding-bottom: 24px;
  border-bottom: 1px solid var(--bd);
}

.header__brand {
  display: flex;
  align-items: center;
  gap: 14px;
}

.header__logo {
  height: 32px;
  width: auto;
  opacity: 0.9;
}

.header__text h1 {
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.3px;
  line-height: 1.2;
}

.header__text p {
  font-size: 12px;
  color: var(--tx3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 500;
}

/* ─── Circular Progress ─── */
.readiness {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
}

.readiness__ring {
  position: relative;
  width: 80px;
  height: 80px;
}

.readiness__ring svg {
  transform: rotate(-90deg);
  width: 80px;
  height: 80px;
}

.readiness__ring .track {
  fill: none;
  stroke: var(--surface2);
  stroke-width: 6;
}

.readiness__ring .progress {
  fill: none;
  stroke: var(--accent);
  stroke-width: 6;
  stroke-linecap: round;
  transition: stroke-dashoffset 1s cubic-bezier(0.4, 0, 0.2, 1);
  filter: drop-shadow(0 0 6px var(--accent-glow));
}

.readiness__value {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 700;
  color: var(--tx);
}

.readiness__label {
  font-size: 11px;
  color: var(--tx3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  font-weight: 600;
}

/* ─── Section ─── */
.section {
  margin-bottom: 28px;
}

.section__title {
  font-size: 13px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.6px;
  color: var(--tx3);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section__title::before {
  content: '';
  display: block;
  width: 3px;
  height: 14px;
  background: var(--accent);
  border-radius: 2px;
}

/* ─── Card ─── */
.card {
  background: var(--glass);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  border: 1px solid var(--bd);
  border-radius: var(--r);
  box-shadow: var(--sh);
  transition: border-color var(--transition), box-shadow var(--transition);
}

.card:hover {
  border-color: var(--bd2);
}

/* ─── Domain Grid ─── */
.domain-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

.domain-card {
  padding: 18px 20px;
}

.domain-card__header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 14px;
}

.domain-card__number {
  font-size: 11px;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.domain-card__name {
  font-size: 14px;
  font-weight: 600;
  margin-top: 2px;
  line-height: 1.3;
  color: var(--tx);
}

.domain-card__badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 3px 8px;
  border-radius: 6px;
  white-space: nowrap;
  flex-shrink: 0;
}

.badge--mastered { background: var(--ok-bg); color: var(--ok); }
.badge--strong { background: var(--ok-bg); color: var(--ok); }
.badge--developing { background: var(--warn-bg); color: var(--warn); }
.badge--weak { background: var(--err-bg); color: var(--err); }
.badge--unassessed { background: var(--surface2); color: var(--tx3); }

.domain-card__bar-wrap {
  margin-bottom: 10px;
}

.domain-card__bar-bg {
  height: 6px;
  background: var(--surface2);
  border-radius: 3px;
  overflow: hidden;
}

.domain-card__bar-fill {
  height: 100%;
  border-radius: 3px;
  transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
  min-width: 2px;
}

.bar--red { background: linear-gradient(90deg, var(--err), #f87171); }
.bar--yellow { background: linear-gradient(90deg, #ca8a04, var(--warn)); }
.bar--green { background: linear-gradient(90deg, #16a34a, var(--ok)); }

.domain-card__stats {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.domain-card__pct {
  font-size: 22px;
  font-weight: 700;
  color: var(--tx);
  line-height: 1;
}

.domain-card__answered {
  font-size: 12px;
  color: var(--tx3);
}

/* ─── Exam History Chart ─── */
.chart-wrap {
  padding: 20px;
}

.chart-container {
  position: relative;
  width: 100%;
  height: 200px;
}

.chart-container canvas {
  width: 100% !important;
  height: 100% !important;
}

.chart-empty {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--tx3);
  font-size: 13px;
}

/* ─── Activity Timeline ─── */
.timeline {
  padding: 6px 20px 16px;
}

.timeline__item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 0;
  border-bottom: 1px solid var(--bd);
}

.timeline__item:last-child {
  border-bottom: none;
}

.timeline__icon {
  flex-shrink: 0;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 700;
}

.timeline__icon--ok {
  background: var(--ok-bg);
  color: var(--ok);
}

.timeline__icon--no {
  background: var(--err-bg);
  color: var(--err);
}

.timeline__body {
  flex: 1;
  min-width: 0;
}

.timeline__domain {
  font-size: 13px;
  font-weight: 500;
  color: var(--tx);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.timeline__meta {
  font-size: 11px;
  color: var(--tx3);
}

.timeline__time {
  flex-shrink: 0;
  font-size: 11px;
  color: var(--tx3);
}

/* ─── Capstone ─── */
.capstone {
  padding: 20px;
}

.capstone__theme {
  font-size: 15px;
  font-weight: 600;
  margin-bottom: 16px;
  color: var(--tx);
}

.capstone__progress {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 12px;
}

.capstone__bar-bg {
  flex: 1;
  height: 8px;
  background: var(--surface2);
  border-radius: 4px;
  overflow: hidden;
}

.capstone__bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), #f59e0b);
  border-radius: 4px;
  transition: width 1s cubic-bezier(0.4, 0, 0.2, 1);
}

.capstone__step-label {
  font-size: 13px;
  font-weight: 600;
  color: var(--tx2);
  white-space: nowrap;
}

.capstone__criteria {
  font-size: 12px;
  color: var(--tx3);
}

.capstone__empty {
  text-align: center;
  padding: 12px;
  color: var(--tx3);
  font-size: 13px;
}

/* ─── Step Dots ─── */
.step-dots {
  display: flex;
  gap: 4px;
  margin-top: 12px;
  flex-wrap: wrap;
}

.step-dot {
  width: 14px;
  height: 14px;
  border-radius: 3px;
  background: var(--surface2);
  border: 1px solid var(--bd);
  transition: background var(--transition);
  font-size: 7px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: transparent;
}

.step-dot--done {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.step-dot--current {
  background: var(--accent-glow);
  border-color: var(--accent);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

/* ─── Quick Actions ─── */
.actions-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 18px;
  background: var(--surface);
  border: 1px solid var(--bd2);
  border-radius: var(--r-sm);
  color: var(--tx);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  font-family: inherit;
  box-shadow: var(--sh);
}

.action-btn:hover {
  border-color: var(--accent);
  background: var(--accent-glow2);
  color: var(--accent);
  transform: translateY(-1px);
  box-shadow: var(--sh-lg);
}

.action-btn:active {
  transform: translateY(0);
}

.action-btn--primary {
  background: var(--accent);
  border-color: var(--accent);
  color: #fff;
}

.action-btn--primary:hover {
  background: #d4693f;
  border-color: #d4693f;
  color: #fff;
}

.action-btn__icon {
  font-size: 15px;
  line-height: 1;
}

/* ─── Toast ─── */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--surface);
  border: 1px solid var(--bd2);
  border-radius: var(--r-sm);
  padding: 10px 20px;
  font-size: 13px;
  color: var(--tx2);
  box-shadow: var(--sh-lg);
  backdrop-filter: blur(var(--blur));
  -webkit-backdrop-filter: blur(var(--blur));
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 100;
  white-space: nowrap;
}

.toast--show {
  transform: translateX(-50%) translateY(0);
}

/* ─── Animations ─── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.animate-in {
  animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1) both;
}

.delay-1 { animation-delay: 0.05s; }
.delay-2 { animation-delay: 0.1s; }
.delay-3 { animation-delay: 0.15s; }
.delay-4 { animation-delay: 0.2s; }
.delay-5 { animation-delay: 0.25s; }
.delay-6 { animation-delay: 0.3s; }
</style>
</head>
<body>
<div class="dashboard" id="app"></div>
<div class="toast" id="toast"></div>

<script>
(function() {
  'use strict';

  var DEMO_DATA = {
    overallReadiness: 62,
    domains: [
      { id: 1, name: 'Agentic Architecture', mastery: 78, level: 'Strong', answered: 23, total: 91 },
      { id: 2, name: 'Tool Design & MCP', mastery: 55, level: 'Developing', answered: 14, total: 65 },
      { id: 3, name: 'Claude Code Config', mastery: 42, level: 'Weak', answered: 8, total: 78 },
      { id: 4, name: 'Prompt Engineering', mastery: 71, level: 'Strong', answered: 18, total: 78 },
      { id: 5, name: 'Context & Reliability', mastery: 0, level: 'Unassessed', answered: 0, total: 78 }
    ],
    examHistory: [
      { date: '2026-02-20', score: 580, passed: false },
      { date: '2026-02-27', score: 640, passed: false },
      { date: '2026-03-05', score: 695, passed: false },
      { date: '2026-03-12', score: 735, passed: true }
    ],
    recentActivity: [
      { questionId: 'q-042', domain: 'Architecture Design', correct: true, timestamp: '2026-03-17T09:45:00Z' },
      { questionId: 'q-041', domain: 'Cost Optimization', correct: true, timestamp: '2026-03-17T09:38:00Z' },
      { questionId: 'q-040', domain: 'Security & Compliance', correct: false, timestamp: '2026-03-17T09:30:00Z' },
      { questionId: 'q-039', domain: 'Networking & Content Delivery', correct: true, timestamp: '2026-03-17T09:22:00Z' },
      { questionId: 'q-038', domain: 'Architecture Design', correct: false, timestamp: '2026-03-16T16:50:00Z' },
      { questionId: 'q-037', domain: 'Cost Optimization', correct: true, timestamp: '2026-03-16T16:42:00Z' },
      { questionId: 'q-036', domain: 'Security & Compliance', correct: false, timestamp: '2026-03-16T16:35:00Z' },
      { questionId: 'q-035', domain: 'Networking & Content Delivery', correct: false, timestamp: '2026-03-16T16:28:00Z' },
      { questionId: 'q-034', domain: 'Architecture Design', correct: true, timestamp: '2026-03-16T16:20:00Z' },
      { questionId: 'q-033', domain: 'Cost Optimization', correct: true, timestamp: '2026-03-16T16:12:00Z' }
    ],
    capstoneBuild: {
      theme: 'Multi-Agent Code Review System',
      currentStep: 7,
      totalSteps: 18,
      criteriaCompleted: 12,
      totalCriteria: 42
    }
  };

  var data = window.__DASHBOARD_DATA__ || DEMO_DATA;

  function esc(s) {
    var d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function barClass(pct) {
    if (pct < 50) return 'bar--red';
    if (pct <= 70) return 'bar--yellow';
    return 'bar--green';
  }

  function badgeClass(level) {
    var l = String(level).toLowerCase();
    if (l === 'mastered') return 'badge--mastered';
    if (l === 'strong') return 'badge--strong';
    if (l === 'developing') return 'badge--developing';
    if (l === 'weak') return 'badge--weak';
    return 'badge--unassessed';
  }

  function relativeTime(ts) {
    var now = Date.now();
    var then = new Date(ts).getTime();
    var diff = Math.max(0, now - then);
    var mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return mins + 'm ago';
    var hrs = Math.floor(mins / 60);
    if (hrs < 24) return hrs + 'h ago';
    var days = Math.floor(hrs / 24);
    return days + 'd ago';
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('toast--show');
    clearTimeout(t._timer);
    t._timer = setTimeout(function() { t.classList.remove('toast--show'); }, 3000);
  }

  // Circumference for the readiness ring
  var CIRC = 2 * Math.PI * 34;

  function renderHeader() {
    var pct = data.overallReadiness;
    var offset = CIRC - (CIRC * pct / 100);
    return '<div class="header animate-in">' +
      '<div class="header__brand">' +
        '<picture>' +
          '<source media="(prefers-color-scheme: dark)" srcset="https://raw.githubusercontent.com/Connectry-io/connectrylab-architect-cert-mcp/master/.github/assets/logo-dark.svg">' +
          '<img class="header__logo" src="https://raw.githubusercontent.com/Connectry-io/connectrylab-architect-cert-mcp/master/.github/assets/logo-light.svg" alt="Connectry" onerror="this.style.display=\'none\'">' +
        '</picture>' +
        '<div class="header__text">' +
          '<h1>Study Dashboard</h1>' +
          '<p>Claude Certified Architect</p>' +
        '</div>' +
      '</div>' +
      '<div class="readiness">' +
        '<div class="readiness__ring">' +
          '<svg viewBox="0 0 80 80">' +
            '<circle class="track" cx="40" cy="40" r="34"/>' +
            '<circle class="progress" cx="40" cy="40" r="34" stroke-dasharray="' + CIRC + '" stroke-dashoffset="' + offset + '"/>' +
          '</svg>' +
          '<div class="readiness__value">' + pct + '%</div>' +
        '</div>' +
        '<span class="readiness__label">Readiness</span>' +
      '</div>' +
    '</div>';
  }

  function renderDomains() {
    var cards = data.domains.map(function(d) {
      return '<div class="card domain-card">' +
        '<div class="domain-card__header">' +
          '<div>' +
            '<div class="domain-card__number">Domain ' + d.id + '</div>' +
            '<div class="domain-card__name">' + esc(d.name) + '</div>' +
          '</div>' +
          '<span class="domain-card__badge ' + badgeClass(d.level) + '">' + esc(d.level) + '</span>' +
        '</div>' +
        '<div class="domain-card__bar-wrap">' +
          '<div class="domain-card__bar-bg">' +
            '<div class="domain-card__bar-fill ' + barClass(d.mastery) + '" style="width:' + Math.max(d.mastery, 1) + '%"></div>' +
          '</div>' +
        '</div>' +
        '<div class="domain-card__stats">' +
          '<span class="domain-card__pct">' + d.mastery + '%</span>' +
          '<span class="domain-card__answered">' + d.answered + ' / ' + d.total + ' answered</span>' +
        '</div>' +
      '</div>';
    }).join('');

    return '<div class="section animate-in delay-1">' +
      '<div class="section__title">Domain Mastery</div>' +
      '<div class="domain-grid">' + cards + '</div>' +
    '</div>';
  }

  function renderExamHistory() {
    var exams = data.examHistory || [];
    var inner;
    if (exams.length === 0) {
      inner = '<div class="chart-empty">No practice exams taken yet</div>';
    } else {
      inner = '<div class="chart-container"><canvas id="examChart"></canvas></div>';
    }
    return '<div class="section animate-in delay-2">' +
      '<div class="section__title">Exam History</div>' +
      '<div class="card chart-wrap">' + inner + '</div>' +
    '</div>';
  }

  function drawChart() {
    var canvas = document.getElementById('examChart');
    if (!canvas) return;
    var exams = data.examHistory || [];
    if (exams.length === 0) return;

    var dpr = window.devicePixelRatio || 1;
    var rect = canvas.parentElement.getBoundingClientRect();
    var W = rect.width;
    var H = rect.height;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';

    var ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);

    var padL = 44, padR = 20, padT = 20, padB = 36;
    var cW = W - padL - padR;
    var cH = H - padT - padB;

    // Score range
    var minScore = 400;
    var maxScore = 1000;
    var range = maxScore - minScore;

    function yPos(score) {
      return padT + cH - ((score - minScore) / range * cH);
    }

    function xPos(i) {
      if (exams.length === 1) return padL + cW / 2;
      return padL + (i / (exams.length - 1)) * cW;
    }

    // Compute styles
    var cs = getComputedStyle(document.documentElement);
    var txColor = cs.getPropertyValue('--tx3').trim() || '#71717a';
    var surfColor = cs.getPropertyValue('--surface2').trim() || '#27272a';
    var accentColor = cs.getPropertyValue('--accent').trim() || '#E8784A';
    var okColor = cs.getPropertyValue('--ok').trim() || '#22c55e';
    var errColor = cs.getPropertyValue('--err').trim() || '#ef4444';

    // Grid lines
    ctx.strokeStyle = surfColor;
    ctx.lineWidth = 1;
    var gridScores = [500, 600, 720, 800, 900];
    gridScores.forEach(function(s) {
      var y = Math.round(yPos(s)) + 0.5;
      ctx.beginPath();
      ctx.moveTo(padL, y);
      ctx.lineTo(W - padR, y);
      if (s === 720) {
        ctx.strokeStyle = accentColor;
        ctx.setLineDash([4, 4]);
        ctx.globalAlpha = 0.6;
      } else {
        ctx.strokeStyle = surfColor;
        ctx.setLineDash([]);
        ctx.globalAlpha = 0.4;
      }
      ctx.stroke();
      ctx.globalAlpha = 1;
      ctx.setLineDash([]);
    });

    // Y-axis labels
    ctx.fillStyle = txColor;
    ctx.font = '11px system-ui, sans-serif';
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    gridScores.forEach(function(s) {
      ctx.fillText(String(s), padL - 8, yPos(s));
    });

    // Passing label
    ctx.fillStyle = accentColor;
    ctx.textAlign = 'left';
    ctx.font = '10px system-ui, sans-serif';
    ctx.fillText('PASS', W - padR + 4, yPos(720));

    // X-axis labels
    ctx.fillStyle = txColor;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.font = '11px system-ui, sans-serif';
    exams.forEach(function(e, i) {
      var parts = e.date.split('-');
      var label = parts[1] + '/' + parts[2];
      ctx.fillText(label, xPos(i), padT + cH + 10);
    });

    // Area fill
    if (exams.length > 1) {
      var grad = ctx.createLinearGradient(0, padT, 0, padT + cH);
      grad.addColorStop(0, 'rgba(232, 120, 74, 0.15)');
      grad.addColorStop(1, 'rgba(232, 120, 74, 0)');
      ctx.beginPath();
      ctx.moveTo(xPos(0), padT + cH);
      exams.forEach(function(e, i) { ctx.lineTo(xPos(i), yPos(e.score)); });
      ctx.lineTo(xPos(exams.length - 1), padT + cH);
      ctx.closePath();
      ctx.fillStyle = grad;
      ctx.fill();
    }

    // Line
    ctx.beginPath();
    ctx.strokeStyle = accentColor;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.lineCap = 'round';
    exams.forEach(function(e, i) {
      if (i === 0) ctx.moveTo(xPos(i), yPos(e.score));
      else ctx.lineTo(xPos(i), yPos(e.score));
    });
    ctx.stroke();

    // Dots and labels
    exams.forEach(function(e, i) {
      var x = xPos(i);
      var y = yPos(e.score);

      // Glow
      ctx.beginPath();
      ctx.arc(x, y, 8, 0, Math.PI * 2);
      ctx.fillStyle = e.passed ? 'rgba(34, 197, 94, 0.2)' : 'rgba(232, 120, 74, 0.2)';
      ctx.fill();

      // Dot
      ctx.beginPath();
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fillStyle = e.passed ? okColor : accentColor;
      ctx.fill();

      // Score label
      ctx.fillStyle = e.passed ? okColor : accentColor;
      ctx.font = 'bold 12px system-ui, sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'bottom';
      ctx.fillText(String(e.score), x, y - 12);
    });
  }

  function renderActivity() {
    var items = (data.recentActivity || []).slice(0, 10);
    if (items.length === 0) {
      return '<div class="section animate-in delay-3">' +
        '<div class="section__title">Recent Activity</div>' +
        '<div class="card" style="padding:20px"><div style="text-align:center;color:var(--tx3);font-size:13px">No activity yet</div></div>' +
      '</div>';
    }

    var rows = items.map(function(a) {
      var ok = a.correct;
      return '<div class="timeline__item">' +
        '<div class="timeline__icon ' + (ok ? 'timeline__icon--ok' : 'timeline__icon--no') + '">' +
          (ok ? '\u2713' : '\u2717') +
        '</div>' +
        '<div class="timeline__body">' +
          '<div class="timeline__domain">' + esc(a.domain) + '</div>' +
          '<div class="timeline__meta">' + esc(a.questionId) + '</div>' +
        '</div>' +
        '<div class="timeline__time">' + relativeTime(a.timestamp) + '</div>' +
      '</div>';
    }).join('');

    return '<div class="section animate-in delay-3">' +
      '<div class="section__title">Recent Activity</div>' +
      '<div class="card timeline">' + rows + '</div>' +
    '</div>';
  }

  function renderCapstone() {
    var c = data.capstoneBuild;
    var inner;
    if (!c) {
      inner = '<div class="capstone__empty">No capstone build started. Ask Claude to begin one.</div>';
    } else {
      var pct = Math.round((c.currentStep / c.totalSteps) * 100);
      var dots = '';
      for (var i = 1; i <= c.totalSteps; i++) {
        var cls = 'step-dot';
        if (i < c.currentStep) cls += ' step-dot--done';
        else if (i === c.currentStep) cls += ' step-dot--current';
        dots += '<div class="' + cls + '" title="Step ' + i + '">' + (i < c.currentStep ? '\u2713' : '') + '</div>';
      }

      inner = '<div class="capstone__theme">' + esc(c.theme) + '</div>' +
        '<div class="capstone__progress">' +
          '<div class="capstone__bar-bg">' +
            '<div class="capstone__bar-fill" style="width:' + pct + '%"></div>' +
          '</div>' +
          '<span class="capstone__step-label">Step ' + c.currentStep + ' / ' + c.totalSteps + '</span>' +
        '</div>' +
        '<div class="capstone__criteria">Criteria covered: ' + c.criteriaCompleted + ' / ' + c.totalCriteria + '</div>' +
        '<div class="step-dots">' + dots + '</div>';
    }

    return '<div class="section animate-in delay-4">' +
      '<div class="section__title">Capstone Build</div>' +
      '<div class="card capstone">' + inner + '</div>' +
    '</div>';
  }

  function renderActions() {
    var actions = [
      { label: 'Continue Studying', icon: '\u25B6', primary: true, cmd: 'get_practice_question' },
      { label: 'Take Practice Exam', icon: '\uD83D\uDCDD', primary: false, cmd: 'start_practice_exam' },
      { label: 'Start Capstone Build', icon: '\uD83D\uDEE0', primary: false, cmd: 'start_capstone_build' },
      { label: 'Show Dashboard', icon: '\uD83D\uDCCA', primary: false, cmd: 'get_progress' }
    ];

    var btns = actions.map(function(a) {
      return '<button class="action-btn' + (a.primary ? ' action-btn--primary' : '') + '" data-cmd="' + a.cmd + '">' +
        '<span class="action-btn__icon">' + a.icon + '</span>' +
        a.label +
      '</button>';
    }).join('');

    return '<div class="section animate-in delay-5">' +
      '<div class="section__title">Quick Actions</div>' +
      '<div class="actions-grid">' + btns + '</div>' +
    '</div>';
  }

  function render() {
    var app = document.getElementById('app');
    app.innerHTML =
      renderHeader() +
      renderDomains() +
      renderExamHistory() +
      renderActivity() +
      renderCapstone() +
      renderActions();

    // Draw chart after DOM is ready
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        drawChart();
      });
    });

    // Bind action buttons
    var btns = app.querySelectorAll('.action-btn');
    btns.forEach(function(btn) {
      btn.addEventListener('click', function() {
        var cmd = btn.getAttribute('data-cmd');
        showToast('Ask Claude to: ' + cmd.replace(/_/g, ' '));
      });
    });
  }

  // Handle resize for chart redraw
  var resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(drawChart, 150);
  });

  // Init
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', render);
  } else {
    render();
  }
})();
</script>
</body>
</html>
